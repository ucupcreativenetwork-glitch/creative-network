<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terima Kasih | Creative Network</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" href="images/logo.png" type="image/png">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .thank-you {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      background: var(--color-bg-alt);
    }
    .thank-you__card {
      max-width: 480px;
      background: var(--color-bg);
      padding: 48px 40px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--color-border);
      box-shadow: var(--shadow-md);
    }
    .thank-you__icon {
      width: 64px;
      height: 64px;
      background: var(--color-primary);
      color: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      margin: 0 auto 24px;
    }
    .thank-you h1 {
      font-size: 1.6rem;
      color: var(--color-dark);
      margin-bottom: 12px;
    }
    .thank-you p {
      color: var(--color-text-light);
      line-height: 1.7;
      margin-bottom: 28px;
    }
  </style>
</head>
<body>
  <section class="thank-you">
    <div class="thank-you__card">
      <div class="thank-you__icon">✓</div>
      <h1>Pesan Terkirim!</h1>
      <p>Terima kasih telah menghubungi Creative Network. Kami telah menerima pesan Anda dan akan segera merespons melalui email atau WhatsApp.</p>
      <a href="index.html" class="btn btn--primary">Kembali ke Beranda</a>
    </div>
  </section>
  <script src="js/site-config.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
